name: Check Links

on:
  push:
    paths:
      - '**/*.md'
  pull_request:
    paths:
      - '**/*.md'

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude "^https?://"
            "**/*.md"
          fail: true

      - name: Check external links (warning only)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-path "node_modules"
            --accept "200..=299,403,429"
            --max-retries 3
            --timeout 30
            "**/*.md"
          fail: false
